<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>今日の綾おみくじ</title>

<style>

body{
margin:0;
background:#000;
font-family:sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
color:white;
}

.container{
position:relative;
width:100vw;
height:100vh;
text-align:center;
}

img{
width:100%;
height:100%;
object-fit:cover;
pointer-events:none;
}

.title{
position:absolute;
top:40px;
left:50%;
transform:translateX(-50%);
font-size:32px;
font-weight:bold;
text-shadow:0 0 20px #ff5aa5;
}

button{
position:absolute;
bottom:80px;
left:50%;
transform:translateX(-50%);
padding:18px 40px;
font-size:22px;
border:none;
border-radius:60px;
background:linear-gradient(45deg,#ff2a6d,#ff7aa2);
color:white;
font-weight:bold;
box-shadow:0 0 20px rgba(255,0,100,0.7);
z-index:10;
}

.result{
position:absolute;
top:100px;
left:50%;
transform:translateX(-50%);
font-size:40px;
font-weight:bold;
text-shadow:0 0 20px gold;
}

.sparkle{
position:absolute;
width:8px;
height:8px;
background:white;
border-radius:50%;
opacity:0;
}

</style>
</head>

<body>

<div class="container">

<div class="title">
今日の綾おみくじ
</div>

<div class="result" id="result"></div>

<img id="photo" src="photo1.jpg">

<button onclick="startRoulette()">おみくじを引く</button>

</div>

<script>

const photos=[
"photo1.jpg",
"photo2.jpg",
"photo3.jpg",
"photo4.jpg",
"photo5.jpg",
"photo6.jpg",
"photo7.jpg",
"photo8.jpg"
];

const fortunes=[
"大吉",
"中吉",
"吉",
"小吉"
];

function startRoulette(){

let duration=5000;
let start=Date.now();

const roulette=setInterval(()=>{

const random=Math.floor(Math.random()*photos.length);

document.getElementById("photo").src=photos[random];

if(Date.now()-start>duration){

clearInterval(roulette);

showFortune();
sparkleEffect();

}

},80);

}

function showFortune(){

const fortune=fortunes[Math.floor(Math.random()*fortunes.length)];

document.getElementById("result").innerText=fortune;

}

function sparkleEffect(){
