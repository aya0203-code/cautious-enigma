<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日の綾おみくじ</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#fff;
  text-align:center;
}

h1{
  margin-top:40px;
}

#image{
  margin-top:20px;
  max-width:90%;
  height:auto;
}

button{
  position:fixed;
  bottom:calc(40px + env(safe-area-inset-bottom));
  left:50%;
  transform:translateX(-50%);
  padding:15px 30px;
  font-size:18px;
  border:none;
  border-radius:30px;
  background:#ff4d6d;
  color:white;
}
</style>
</head>

<body>

<h1>今日の綾おみくじ</h1>

<img id="image" src="1.jpg">

<br><br>

<button onclick="draw()">おみくじを引く</button>

<script>
function draw(){

  const number = Math.floor(Math.random()*17)+1;

  document.getElementById("image").src = number + ".jpg";

}
</script>

</body>
</html>
