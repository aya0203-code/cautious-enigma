<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日の綾おみくじ</title>

<style>
body{
  text-align:center;
  font-family:sans-serif;
  background:#fff;
  overflow:hidden;
}

h1{
  margin-top:40px;
}

img{
  max-width:90%;
  margin-top:20px;
}

/* ボタン */
button{
  position:fixed;
  bottom:calc(40px + env(safe-area-inset-bottom));
  left:50%;
  transform:translateX(-50%);
  padding:15px 30px;
  font-size:18px;
  border:none;
  border-radius:30px;
  background:#ff4d6d;
  color:white;
}

/* キラキラ */
.sparkle{
  position:fixed;
  width:10px;
  height:10px;
  background:gold;
  border-radius:50%;
  animation:fall 1s linear forwards;
}

@keyframes fall{
  from{
    transform:translateY(0);
    opacity:1;
  }
  to{
    transform:translateY(200px);
    opacity:0;
  }
}

/* 結果テキスト */
#result{
  font-size:24px;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>今日の綾おみくじ</h1>

<img id="image" src="photo9.jpg">
<div id="result"></div>

<button onclick="draw()">おみくじを引く</button>

<script>
const images = [
"photo1.jpg",
"photo2.jpg",
"photo3.jpg",
"photo4.jpg",
"photo5.jpg",
"photo6.jpg",
"photo7.jpg",
"photo8.jpg",
"photo9.jpg",
"photo10.jpg",
"photo11.jpg",
"photo12.jpg",
"photo13.jpg.JPG",
"photo14.jpg.JPG",
"photo15.jpg.JPG",
"photo16.jpg",
"photo17.jpg.JPG",
"photo18.jpg.JPG"
];

const results = [
"大吉🔥",
"中吉✨",
"小吉😊",
"吉👍",
"末吉😏",
"凶💀",
"超大吉💖",
"神引き😍",
"ラッキーDAY🌈"
];

function draw(){

  let count = 0;

  // シャッフル演出
  const interval = setInterval(()=>{
    const random = Math.floor(Math.random() * images.length);
    document.getElementById("image").src = images[random];
    count++;

    if(count > 15){
      clearInterval(interval);

      // 最終結果
      const final = Math.floor(Math.random() * images.length);
      document.getElementById("image").src = images[final];

      const result = results[Math.floor(Math.random() * results.length)];
      document.getElementById("result").innerText = result;

      sparkle();
    }

  },100);
}

// キラキラ生成
function sparkle(){
  for(let i=0;i<20;i++){
    const s = document.createElement("div");
    s.className = "sparkle";
    s.style.left = Math.random()*100 + "vw";
    s.style.top = Math.random()*50 + "vh";
    document.body.appendChild(s);

    setTimeout(()=>{s.remove();},1000);
  }
}
</script>

</body>
</html>
