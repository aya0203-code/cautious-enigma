<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日の綾おみくじ</title>

<style>
body{
  text-align:center;
  font-family:sans-serif;
}

img{
  max-width:90%;
  margin-top:20px;
}

button{
  position:fixed;
  bottom:calc(40px + env(safe-area-inset-bottom));
  left:50%;
  transform:translateX(-50%);
  padding:15px 30px;
  font-size:18px;
}
</style>
</head>

<body>

<h1>今日の綾おみくじ</h1>

<img id="image" src="photo1.jpg">

<button onclick="draw()">おみくじを引く</button>

<script>
const images = [
"photo1.jpg",
"photo2.jpg",
"photo3.jpg",
"photo4.jpg",
"photo5.jpg",
"photo6.jpg",
"photo7.jpg",
"photo8.jpg",
"photo9.jpg",
"photo10.jpg",
"photo11.jpg",
"photo12.jpg",
"photo13.jpg.JPG",
"photo14.jpg.JPG",
"photo15.jpg.JPG",
"photo16.jpg",
"photo17.jpg.JPG",
"photo18.jpg.JPG"
];

function draw(){
  const random = Math.floor(Math.random() * images.length);
  document.getElementById("image").src = images[random];
}
</script>

</body>
</html>
