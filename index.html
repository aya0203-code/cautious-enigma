<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日の綾おみくじ</title>

<style>
body{
  text-align:center;
  font-family:sans-serif;
  background:linear-gradient(180deg,#fff,#ffe4ec);
  overflow:hidden;
}

/* タイトル強化 */
h1{
  margin-top:40px;
  font-size:28px;
  color:#ff4d6d;
  text-shadow:0 0 10px #ff9bb0, 0 0 20px #ffccd5;
}

/* 画像 */
img{
  max-width:90%;
  margin-top:20px;
  border-radius:10px;
}

/* ボタン */
button{
  position:fixed;
  bottom:calc(40px + env(safe-area-inset-bottom));
  left:50%;
  transform:translateX(-50%);
  padding:15px 30px;
  font-size:18px;
  border:none;
  border-radius:30px;
  background:#ff4d6d;
  color:white;
}

/* 結果 */
#result{
  font-size:26px;
  margin-top:15px;
  font-weight:bold;
  color:#ff3366;
}

/* キラキラ */
.sparkle{
  position:fixed;
  width:8px;
  height:8px;
  background:gold;
  border-radius:50%;
  animation:fall 1.5s linear forwards;
}

@keyframes fall{
  from{transform:translateY(0);opacity:1;}
  to{transform:translateY(300px);opacity:0;}
}
</style>
</head>

<body>

<h1>✨今日の綾おみくじ✨</h1>

<img id="image" src="photo9.jpg">
<div id="result"></div>

<button onclick="draw()">おみくじを引く</button>

<script>
const images = [
"photo1.jpg","photo2.jpg","photo3.jpg","photo4.jpg","photo5.jpg",
"photo6.jpg","photo7.jpg","photo8.jpg","photo9.jpg","photo10.jpg",
"photo11.jpg","photo12.jpg","photo13.jpg.JPG","photo14.jpg.JPG",
"photo15.jpg.JPG","photo16.jpg","photo17.jpg.JPG","photo18.jpg.JPG"
];

const results = [
"大吉🔥","中吉✨","小吉😊","吉👍","末吉😏",
"凶💀","超大吉💖","神引き😍","ラッキーDAY🌈"
];

function draw(){

  const today = new Date().toLocaleDateString();
  if(localStorage.getItem("omikujiDate") === today){
    document.getElementById("result").innerText = "今日はもう引いたでしょ😏";
    return;
  }

  localStorage.setItem("omikujiDate", today);

  let count = 0;
  let speed = 50;

  function shuffle(){
    const random = Math.floor(Math.random() * images.length);
    document.getElementById("image").src = images[random];
    count++;
    speed += 15; // だんだん遅く

    if(count < 25){
      setTimeout(shuffle, speed);
    }else{
      finish();
    }
  }

  function finish(){
    const finalIndex = Math.floor(Math.random() * images.length);
    document.getElementById("image").src = images[finalIndex];

    const result = results[finalIndex % results.length];
    document.getElementById("result").innerText = result;

    sparkle();
  }

  shuffle();
}

// キラキラ
function sparkle(){
  for(let i=0;i<30;i++){
    const s = document.createElement("div");
    s.className = "sparkle";
    s.style.left = Math.random()*100 + "vw";
    s.style.top = Math.random()*50 + "vh";
    document.body.appendChild(s);
    setTimeout(()=>{s.remove();},1500);
  }
}
</script>

</body>
</html>
